<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADS-B Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #070d14;
    --surface:   #0a1520;
    --border:    #0d2a1a;
    --green:     #00ff88;
    --green-dim: #1a6644;
    --green-mid: #00cc6a;
    --green-faint:#052a18;
    --amber:     #ffb347;
    --cyan:      #00cfff;
    --red:       #ff4444;
    --text:      #00ff88;
    --text-dim:  #2a7a50;
    --mono:      'Share Tech Mono', 'Courier New', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: var(--mono);
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: grid;
    grid-template-rows: 36px 1fr 28px;
    grid-template-columns: 1fr 240px;
    grid-template-areas:
      "header header"
      "radar  sidebar"
      "footer footer";
    width: 100vw;
    height: 100vh;
  }

  /* ── Header ── */
  #header {
    grid-area: header;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  #header .title { font-size: 14px; color: var(--green); letter-spacing: 0.12em; }
  #header .coords { color: var(--text-dim); }
  #header .utc { color: var(--green-mid); }

  /* ── Radar canvas area ── */
  #radar-wrap {
    grid-area: radar;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    overflow: hidden;
  }

  #radar-canvas {
    display: block;
    cursor: crosshair;
  }

  /* Scanline overlay */
  #radar-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ── Sidebar ── */
  #sidebar {
    grid-area: sidebar;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #sidebar-header span { color: var(--green); }

  #controls {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
  }
  .ctrl-row label { color: var(--text-dim); }
  .ctrl-row input[type=range] {
    width: 100px;
    accent-color: var(--green);
  }
  .ctrl-val { color: var(--green); min-width: 36px; text-align: right; font-size: 11px; }

  /* ── Toggle switches ── */
  .ctrl-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    padding: 1px 0;
  }
  .toggle-wrap { display: flex; align-items: center; gap: 6px; }
  .toggle {
    position: relative; width: 32px; height: 17px;
    display: inline-block; flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #0a2a18;
    border: 1px solid var(--green-dim);
    border-radius: 17px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    left: 2px; top: 2px;
    background: var(--green-dim);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: #0a4028; border-color: var(--green); }
  .toggle input:checked + .toggle-track::after { transform: translateX(15px); background: var(--green); }
  .toggle-label { color: var(--text-dim); font-size: 11px; }
  .toggle-label.active { color: var(--green); }

  /* ── Military aircraft styling ── */
  .ac-item.military .callsign { color: var(--amber); }
  .ac-item.military { border-left: 2px solid #7a4a00; }
  .ac-item.military.selected { border-left: 2px solid var(--amber); background: rgba(255,179,71,0.08); }
  .mil-badge {
    display: inline-block;
    font-size: 9px;
    color: var(--amber);
    border: 1px solid #7a4a00;
    padding: 0 3px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }

  /* ── New contact pulse animation ── */
  @keyframes newContact {
    0%   { background: rgba(0,255,136,0.35); box-shadow: inset 0 0 8px rgba(0,255,136,0.5); }
    40%  { background: rgba(0,255,136,0.15); }
    70%  { background: rgba(0,255,136,0.08); }
    100% { background: transparent; box-shadow: none; }
  }
  .ac-item.new-contact { animation: newContact 2.5s ease-out forwards; }
  .ac-item.new-contact .callsign { color: #ffffff; }

  /* ── Audio indicator in sidebar header ── */
  #audio-badge {
    font-size: 10px;
    color: var(--text-dim);
    border: 1px solid var(--green-dim);
    padding: 1px 5px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  #audio-badge:hover { border-color: var(--green); color: var(--green); }
  #audio-badge.on { color: var(--green); border-color: var(--green); }

  #ac-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .ac-item {
    padding: 6px 12px;
    border-bottom: 1px solid var(--green-faint);
    cursor: pointer;
    transition: background 0.1s;
    font-size: 11px;
  }
  .ac-item:hover { background: rgba(0,255,136,0.06); }
  .ac-item.selected { background: rgba(0,255,136,0.1); border-left: 2px solid var(--green); }
  .ac-item .callsign { font-size: 12px; color: var(--green); margin-bottom: 2px; }
  .ac-item .ac-meta { color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; }
  .ac-item .ac-meta span { white-space: nowrap; }

  #detail-panel {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    font-size: 11px;
    min-height: 130px;
    background: rgba(0,255,136,0.03);
  }
  #detail-panel .dp-title { color: var(--green); font-size: 13px; margin-bottom: 8px; }
  #detail-panel .dp-row { display: flex; justify-content: space-between; color: var(--text-dim); margin-bottom: 3px; }
  #detail-panel .dp-row span:last-child { color: var(--green-mid); }
  #detail-panel .dp-empty { color: var(--text-dim); padding-top: 8px; }

  /* ── Footer ── */
  #footer {
    grid-area: footer;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 11px;
  }
  #footer .status-ok  { color: var(--green-mid); }
  #footer .status-err { color: var(--red); }
  #footer .status-warn{ color: var(--amber); }

  /* ── Config modal ── */
  #cfg-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #cfg-overlay.open { display: flex; }
  #cfg-box {
    background: var(--surface);
    border: 1px solid var(--green-dim);
    padding: 24px;
    width: 380px;
    font-size: 12px;
  }
  #cfg-box h2 { color: var(--green); font-size: 14px; margin-bottom: 16px; letter-spacing: 0.1em; }
  .cfg-field { margin-bottom: 12px; }
  .cfg-field label { display: block; color: var(--text-dim); margin-bottom: 4px; font-size: 11px; }
  .cfg-field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
  }
  .cfg-field input:focus { border-color: var(--green); }
  .cfg-note { color: var(--text-dim); font-size: 10px; margin-top: 4px; }
  .cfg-btns { display: flex; gap: 8px; margin-top: 16px; }
  .cfg-btns button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cfg-btns button.primary {
    border-color: var(--green);
    color: var(--green);
  }
  .cfg-btns button:hover { background: rgba(0,255,136,0.08); }

  #cfg-btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  #cfg-btn:hover { border-color: var(--green); color: var(--green); }

  @media (max-width: 640px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: 36px 1fr 180px 28px;
      grid-template-areas: "header" "radar" "sidebar" "footer";
    }
    #sidebar { border-left: none; border-top: 1px solid var(--border); }
    #ac-list { max-height: 90px; }
    #detail-panel { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div id="app">
  <header id="header">
    <span class="title">▶ ADS-B RADAR</span>
    <span class="coords" id="hdr-coords">—</span>
    <span class="utc" id="hdr-utc">——:——:—— UTC</span>
  </header>

  <div id="radar-wrap">
    <canvas id="radar-canvas"></canvas>
  </div>

  <aside id="sidebar">
    <div id="sidebar-header">
      <span id="ac-count">0 aircraft</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <span id="audio-badge" title="Toggle audio alert for new contacts">♪ OFF</span>
        <button id="cfg-btn">⚙ CONFIG</button>
      </div>
    </div>
    <div id="controls">
      <div class="ctrl-row">
        <label>Range</label>
        <input type="range" id="range-slider" min="25" max="300" step="25" value="100">
        <span class="ctrl-val" id="range-val">100 nm</span>
      </div>
      <div class="ctrl-row">
        <label>Min altitude</label>
        <input type="range" id="alt-slider" min="0" max="45000" step="1000" value="0">
        <span class="ctrl-val" id="alt-val">ALL</span>
      </div>
      <div class="ctrl-toggle">
        <span>Military only</span>
        <label class="toggle">
          <input type="checkbox" id="mil-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
    <div id="ac-list"></div>
    <div id="detail-panel"><div class="dp-empty">Select an aircraft</div></div>
  </aside>

  <footer id="footer">
    <span id="ft-status" class="status-warn">Not configured — click ⚙ CONFIG</span>
    <span id="ft-poll">—</span>
    <span id="ft-count">—</span>
  </footer>
</div>

<!-- Config modal -->
<div id="cfg-overlay">
  <div id="cfg-box">
    <h2>⚙ CONFIGURATION</h2>
    <div class="cfg-field">
      <label>RAPIDAPI KEY</label>
      <input type="password" id="cfg-key" placeholder="your-rapidapi-key-here">
      <div class="cfg-note">From rapidapi.com → ADSBexchange.com subscription</div>
    </div>
    <div class="cfg-field">
      <label>HOME LATITUDE</label>
      <input type="number" id="cfg-lat" placeholder="50.2330" step="0.0001" value="50.2330">
    </div>
    <div class="cfg-field">
      <label>HOME LONGITUDE</label>
      <input type="number" id="cfg-lon" placeholder="-5.2280" step="0.0001" value="-5.2280">
    </div>
    <div class="cfg-field">
      <label>POLL INTERVAL (seconds)</label>
      <input type="number" id="cfg-poll" placeholder="5" min="3" max="60" value="5">
      <div class="cfg-note">Minimum 3s — keep within your API plan's request limit</div>
    </div>
    <div class="cfg-btns">
      <button id="cfg-cancel">CANCEL</button>
      <button id="cfg-demo">DEMO MODE</button>
      <button class="primary" id="cfg-save">CONNECT</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
// Clockwise rotation offset in degrees applied to the entire radar view.
// 80° means "up" on screen points roughly NNE — tuned so aircraft positions
// match your real-world view when sitting at your desk in Redruth.
const ROTATION_DEG = 80;

const STATE = {
  apiKey:      '',
  lat:         50.2330,
  lon:         -5.2280,
  pollMs:      5000,
  radiusNm:    100,
  minAlt:      0,
  milOnly:     false,
  audioOn:     false,
  aircraft:    [],
  selected:    null,
  sweepAngle:  0,
  lastFetch:   0,
  statusMsg:   'Not configured',
  statusClass: 'status-warn',
  errorCount:  0,
  demoMode:    false,
  trail:       new Map(),
  pollTimer:   null,
  coastFeatures: null,
  coastLoading:  false,
  // Tracks hex codes seen in previous poll to detect new contacts
  knownHexes:  new Set(),
  // Hex codes that are new this cycle (cleared after render)
  newContacts: new Set(),
};

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('radar-canvas');
const ctx    = canvas.getContext('2d');
let CX, CY, R; // centre x, centre y, radar radius px

function resize() {
  const wrap = document.getElementById('radar-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const pad = 32;
  R  = Math.min(canvas.width, canvas.height) / 2 - pad;
  CX = canvas.width  / 2;
  CY = canvas.height / 2;
}
window.addEventListener('resize', resize);
resize();

// ─── Geo helpers ─────────────────────────────────────────────────────────────
function haversineNm(lat1, lon1, lat2, lon2) {
  const R  = 3440.065;
  const d1 = (lat2 - lat1) * Math.PI / 180;
  const d2 = (lon2 - lon1) * Math.PI / 180;
  const a  = Math.sin(d1/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(d2/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function bearingDeg(lat1, lon1, lat2, lon2) {
  const dlon = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dlon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
             Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dlon);
  return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
}

function polarToXY(bearing, distNm) {
  const frac  = distNm / STATE.radiusNm;
  // Apply clockwise rotation: subtract from bearing so the view rotates CW
  const angle = (bearing - 90 + ROTATION_DEG) * Math.PI / 180;
  return {
    x: CX + frac * R * Math.cos(angle),
    y: CY + frac * R * Math.sin(angle),
  };
}

// ─── Altitude colour ──────────────────────────────────────────────────────────
function altColour(alt) {
  if (alt === null || alt === undefined || alt === 'ground') return '#888888';
  const a = Number(alt);
  if (a <  5000) return '#00cfff';
  if (a < 15000) return '#00ff88';
  if (a < 25000) return '#aaff44';
  if (a < 35000) return '#ffb347';
  return '#ff6666';
}

// ─── Coastline map ────────────────────────────────────────────────────────────
// Fetches a low-resolution Natural Earth coastline GeoJSON covering
// the British Isles region, then projects each coordinate onto the radar.

async function loadCoastline() {
  if (STATE.coastFeatures || STATE.coastLoading) return;
  STATE.coastLoading = true;
  // Natural Earth 1:50m coastline via the martynafford CDN on GitHub
  // We use the raw GitHub URL for the 50m coastline which is ~500 KB
  const url = 'https://raw.githubusercontent.com/martynafford/natural-earth-geojson/master/50m/physical/ne_50m_coastline.json';
  try {
    const res  = await fetch(url);
    const data = await res.json();
    STATE.coastFeatures = data.features || [];
  } catch (e) {
    console.warn('Coastline load failed:', e);
    STATE.coastFeatures = [];
  }
  STATE.coastLoading = false;
}

function geoToXY(lon, lat) {
  // Convert a geographic coordinate to radar pixel position,
  // relative to the home position, applying the view rotation.
  const dist    = haversineNm(STATE.lat, STATE.lon, lat, lon);
  const bearing = bearingDeg(STATE.lat, STATE.lon, lat, lon);
  if (dist > STATE.radiusNm * 1.5) return null; // outside visible area
  const frac  = dist / STATE.radiusNm;
  const angle = (bearing - 90 + ROTATION_DEG) * Math.PI / 180;
  return {
    x: CX + frac * R * Math.cos(angle),
    y: CY + frac * R * Math.sin(angle),
  };
}

function drawCoastline() {
  if (!STATE.coastFeatures || STATE.coastFeatures.length === 0) return;

  // Clip drawing to the radar circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R - 1, 0, Math.PI * 2);
  ctx.clip();

  ctx.strokeStyle = 'rgba(0, 180, 90, 0.22)';
  ctx.lineWidth   = 1;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';

  STATE.coastFeatures.forEach(feature => {
    const geom = feature.geometry;
    if (!geom) return;

    const drawLineString = coords => {
      let started = false;
      ctx.beginPath();
      coords.forEach(([lon, lat]) => {
        const pt = geoToXY(lon, lat);
        if (!pt) { started = false; return; }
        if (!started) { ctx.moveTo(pt.x, pt.y); started = true; }
        else ctx.lineTo(pt.x, pt.y);
      });
      ctx.stroke();
    };

    if (geom.type === 'LineString') {
      drawLineString(geom.coordinates);
    } else if (geom.type === 'MultiLineString') {
      geom.coordinates.forEach(drawLineString);
    }
  });

  ctx.restore();
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw(dt) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background inside radar circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.fillStyle = '#050c10';
  ctx.fill();
  ctx.restore();

  drawCoastline();
  drawPhosphorTrail();
  drawSweep();
  drawRingsAndGrid();
  drawAircraft();
  drawHomeMarker();
  drawRangeLabels();
}

function drawRingsAndGrid() {
  const rings = [0.25, 0.5, 0.75, 1.0];
  rings.forEach((f, i) => {
    const r   = R * f;
    const dim = i < rings.length - 1;
    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.strokeStyle = dim ? '#0a2218' : '#124d2a';
    ctx.lineWidth   = dim ? 1 : 1.5;
    ctx.stroke();
  });

  // Cross hairs — rotated to match view
  for (let d = 0; d < 360; d += 45) {
    const angle = (d - 90 + ROTATION_DEG) * Math.PI / 180;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + R * Math.cos(angle), CY + R * Math.sin(angle));
    ctx.strokeStyle = d % 90 === 0 ? '#0a2218' : '#070f0c';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Outer ring clip
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.strokeStyle = '#1a5c30';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Cardinals — rotate labels to match view rotation
  const cardinals = [['N',0],['E',90],['S',180],['W',270]];
  ctx.font = '12px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  cardinals.forEach(([lbl, deg]) => {
    const angle = (deg - 90 + ROTATION_DEG) * Math.PI / 180;
    const lx = CX + (R + 18) * Math.cos(angle);
    const ly = CY + (R + 18) * Math.sin(angle);
    ctx.fillStyle = '#00cc6a';
    ctx.fillText(lbl, lx, ly);
  });
}

function drawRangeLabels() {
  const rings = [0.25, 0.5, 0.75, 1.0];
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.fillStyle = '#1a5c30';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  rings.forEach(f => {
    const nm  = Math.round(STATE.radiusNm * f);
    const r   = R * f;
    ctx.fillText(`${nm}nm`, CX + 4, CY - r + 1);
  });
}

// Phosphor trail — we store lit positions keyed by angle bucket
// Each sweep pass lights up blip positions; they fade over ~4 sweeps
function drawPhosphorTrail() {
  // Decay existing trail
  STATE.trail.forEach((entry, key) => {
    entry.alpha -= 0.012;
    if (entry.alpha <= 0) STATE.trail.delete(key);
    else {
      ctx.beginPath();
      ctx.arc(entry.x, entry.y, entry.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,136,${entry.alpha * 0.35})`;
      ctx.fill();
    }
  });
}

function recordTrail(x, y, r, key) {
  STATE.trail.set(key, { x, y, r, alpha: 1.0 });
}

function drawSweep() {
  const sweepRad = (STATE.sweepAngle - 90 + ROTATION_DEG) * Math.PI / 180;
  const WEDGE    = 28 * Math.PI / 180;

  // Glow wedge
  const grad = ctx.createConicalGradient
    ? null   // fallback below
    : null;

  // Draw as filled arc sector with alpha gradient
  const steps = 24;
  for (let i = 0; i < steps; i++) {
    const t     = i / steps;
    const angle = sweepRad - WEDGE * (1 - t);
    const alpha = t * 0.22;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, angle - (WEDGE / steps), angle + 0.01);
    ctx.closePath();
    ctx.fillStyle = `rgba(0,255,136,${alpha})`;
    ctx.fill();
  }

  // Leading edge bright line
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(CX + R * Math.cos(sweepRad), CY + R * Math.sin(sweepRad));
  ctx.strokeStyle = 'rgba(0,255,136,0.85)';
  ctx.lineWidth   = 1.5;
  ctx.shadowBlur  = 6;
  ctx.shadowColor = '#00ff88';
  ctx.stroke();
  ctx.shadowBlur  = 0;
}

function drawAircraft() {
  // Only draw aircraft within the radar circle and above minAlt
  STATE.aircraft.forEach(ac => {
    if (ac._distNm > STATE.radiusNm) return;
    if (STATE.milOnly && !ac._military) return;
    const alt = (typeof ac.alt_baro === 'number') ? ac.alt_baro : null;
    if (alt !== null && alt < STATE.minAlt) return;

    const { x, y } = polarToXY(ac._bearing, ac._distNm);
    const isMil = ac._military;
    const col   = isMil ? '#ffb347' : altColour(alt);
    const sel   = STATE.selected === ac.hex;
    const size = sel ? 8 : 6;
    // Rotate heading chevron by the same view rotation so it points correctly
    const track = ((ac.track || 0) + ROTATION_DEG) * Math.PI / 180;

    // Light up trail at blip position
    const trailKey = `${Math.round(ac._bearing)}-${ac.hex}`;
    // Compare sweep against the rotated bearing as seen on screen
    const displayBearing = (ac._bearing + ROTATION_DEG + 360) % 360;
    const sweepDiff = Math.abs(((STATE.sweepAngle - displayBearing) + 360) % 360);
    if (sweepDiff < 30) recordTrail(x, y, size * 0.8, trailKey);

    // Plane chevron
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(track);
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(size * 0.55, size * 0.7);
    ctx.lineTo(0, size * 0.35);
    ctx.lineTo(-size * 0.55, size * 0.7);
    ctx.closePath();
    if (sel) {
      ctx.fillStyle = '#ffdd44';
      ctx.shadowBlur  = 10;
      ctx.shadowColor = '#ffdd44';
    } else {
      ctx.fillStyle = col;
      ctx.shadowBlur  = 4;
      ctx.shadowColor = col;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Callsign
    const callsign = (ac.flight || ac.hex || '????').trim().substring(0, 8);
    ctx.font = `${sel ? 11 : 10}px "Share Tech Mono", monospace`;
    ctx.fillStyle = sel ? '#ffdd44' : col;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    let lx = x + size + 3;
    let ly = y - size;
    if (lx + 60 > CX + R) lx = x - size - 64;
    ctx.fillText(callsign, lx, ly);

    // Altitude tag
    if (alt !== null) {
      const fl = `FL${Math.round(alt / 100).toString().padStart(3,'0')}`;
      ctx.fillStyle = sel ? '#ffdd88' : '#1a7a50';
      ctx.font = '9px "Share Tech Mono", monospace';
      ctx.fillText(fl, lx, ly + 12);
    }
  });
}

function drawHomeMarker() {
  ctx.beginPath();
  ctx.arc(CX, CY, 5, 0, Math.PI*2);
  ctx.strokeStyle = '#00ff88';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur  = 8;
  ctx.shadowColor = '#00ff88';
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(CX, CY, 2, 0, Math.PI*2);
  ctx.fillStyle = '#00ff88';
  ctx.fill();
}

// ─── Animation loop ───────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;
  STATE.sweepAngle = (STATE.sweepAngle + 45 * dt) % 360;
  draw(dt);
  updateClock();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const hh  = String(now.getUTCHours()).padStart(2,'0');
  const mm  = String(now.getUTCMinutes()).padStart(2,'0');
  const ss  = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('hdr-utc').textContent = `${hh}:${mm}:${ss} UTC`;
}

// ─── API fetch ────────────────────────────────────────────────────────────────
async function fetchAircraft() {
  if (STATE.demoMode) { injectDemoData(); return; }
  if (!STATE.apiKey) return;

  const url = `https://adsbexchange-com1.p.rapidapi.com/v2/lat/${STATE.lat}/lon/${STATE.lon}/dist/${STATE.radiusNm}/`;
  try {
    const res = await fetch(url, {
      headers: {
        'x-rapidapi-key':  STATE.apiKey,
        'x-rapidapi-host': 'adsbexchange-com1.p.rapidapi.com',
      }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    processAircraft(data.ac || []);
    STATE.errorCount = 0;
    setStatus(`${STATE.aircraft.length} aircraft`, 'status-ok');
    document.getElementById('ft-poll').textContent = `Last: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    STATE.errorCount++;
    setStatus(`Error: ${err.message}`, 'status-err');
  }
}

// ─── Audio ping ───────────────────────────────────────────────────────────────
let audioCtx = null;
function playPing() {
  if (!STATE.audioOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Short double-blip: 880Hz then 660Hz, each 80ms
    [[880, 0], [660, 0.12]].forEach(([freq, delay]) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = audioCtx.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      osc.start(t);
      osc.stop(t + 0.1);
    });
  } catch (e) { /* audio not available */ }
}

// ─── Military detection ───────────────────────────────────────────────────────
// ADSBexchange sets dbFlags bit 1 for military.
// As a belt-and-braces fallback, also check squawk 7777 (mil intercept)
// and common UK/NATO military ICAO hex prefixes.
const MIL_HEX_PREFIXES = [
  '43c',  // UK RAF
  '43e',  // UK RAF
  '43f',  // UK military
  'ae',   // US military (starts with AE)
  'a1',   // some US mil
];
function isMilitary(ac) {
  if (ac.dbFlags && (ac.dbFlags & 1)) return true;
  if (ac.squawk === '7777') return true;
  const hex = (ac.hex || '').toLowerCase();
  return MIL_HEX_PREFIXES.some(p => hex.startsWith(p));
}

function processAircraft(raw) {
  const prevHexes = new Set(STATE.knownHexes);

  const enriched = raw
    .filter(ac => ac.lat != null && ac.lon != null)
    .map(ac => ({
      ...ac,
      _distNm:   haversineNm(STATE.lat, STATE.lon, ac.lat, ac.lon),
      _bearing:  bearingDeg(STATE.lat, STATE.lon, ac.lat, ac.lon),
      _military: isMilitary(ac),
    }))
    .sort((a, b) => a._distNm - b._distNm);

  // Detect new contacts (hex not seen last cycle, within range)
  STATE.newContacts.clear();
  const currentHexes = new Set();
  let hasNewMil = false;
  enriched.forEach(ac => {
    currentHexes.add(ac.hex);
    if (ac._distNm <= STATE.radiusNm && !prevHexes.has(ac.hex) && prevHexes.size > 0) {
      STATE.newContacts.add(ac.hex);
      if (ac._military) hasNewMil = true;
    }
  });
  STATE.knownHexes = currentHexes;

  // Play audio if new contacts arrived (double-ping for military)
  if (STATE.newContacts.size > 0) {
    playPing();
    if (hasNewMil) setTimeout(playPing, 350); // extra ping for mil
  }

  STATE.aircraft = enriched;
  renderList();
  if (STATE.selected) renderDetail(STATE.aircraft.find(a => a.hex === STATE.selected));

  const milCount = enriched.filter(a => a._military && a._distNm <= STATE.radiusNm).length;
  const visCount = enriched.filter(a => a._distNm <= STATE.radiusNm).length;
  document.getElementById('ac-count').textContent =
    milCount > 0 ? `${visCount} ac  ✦${milCount} mil` : `${visCount} aircraft`;
  document.getElementById('ft-count').textContent = `Range: ${STATE.radiusNm}nm`;
}

function setStatus(msg, cls) {
  const el = document.getElementById('ft-status');
  el.textContent = msg;
  el.className   = cls;
}

// ─── Sidebar list ─────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('ac-list');
  list.innerHTML = '';

  const visible = STATE.aircraft.filter(ac => {
    const alt = typeof ac.alt_baro === 'number' ? ac.alt_baro : null;
    const inRange  = ac._distNm <= STATE.radiusNm;
    const aboveAlt = alt === null || alt >= STATE.minAlt;
    const milPass  = !STATE.milOnly || ac._military;
    return inRange && aboveAlt && milPass;
  });

  if (visible.length === 0) {
    const msg = STATE.milOnly ? 'No military contacts in range' : 'No aircraft in range';
    list.innerHTML = `<div class="ac-item" style="color:var(--text-dim)">${msg}</div>`;
    return;
  }

  visible.forEach(ac => {
    const callsign  = (ac.flight || ac.hex || '????').trim();
    const alt       = typeof ac.alt_baro === 'number' ? `FL${Math.round(ac.alt_baro/100).toString().padStart(3,'0')}` : 'GND';
    const spd       = ac.gs ? `${Math.round(ac.gs)}kt` : '—';
    const dist      = `${ac._distNm.toFixed(1)}nm`;
    const sel       = STATE.selected === ac.hex;
    const isNew     = STATE.newContacts.has(ac.hex);
    const isMil     = ac._military;

    const classes = [
      'ac-item',
      sel     ? 'selected'    : '',
      isNew   ? 'new-contact' : '',
      isMil   ? 'military'    : '',
    ].filter(Boolean).join(' ');

    const milTag = isMil ? '<span class="mil-badge">MIL</span>' : '';
    const newTag = isNew ? '<span style="font-size:9px;color:#fff;margin-left:4px">NEW</span>' : '';

    const div = document.createElement('div');
    div.className = classes;
    div.innerHTML = `
      <div class="callsign">${callsign}${milTag}${newTag}</div>
      <div class="ac-meta">
        <span>${alt}</span>
        <span>${spd}</span>
        <span>${dist}</span>
      </div>`;
    div.addEventListener('click', () => selectAircraft(ac.hex));
    list.appendChild(div);
  });
}

function selectAircraft(hex) {
  STATE.selected = STATE.selected === hex ? null : hex;
  renderList();
  renderDetail(STATE.aircraft.find(a => a.hex === hex));
}

function renderDetail(ac) {
  const panel = document.getElementById('detail-panel');
  if (!ac || STATE.selected !== ac.hex) {
    panel.innerHTML = '<div class="dp-empty">Select an aircraft</div>';
    return;
  }
  const callsign = (ac.flight || ac.hex || '????').trim();
  const alt   = typeof ac.alt_baro === 'number' ? `FL${Math.round(ac.alt_baro/100).toString().padStart(3,'0')} (${ac.alt_baro.toLocaleString()}ft)` : 'On ground';
  const spd   = ac.gs   ? `${Math.round(ac.gs)} kt` : '—';
  const hdg   = ac.track ? `${Math.round(ac.track)}°` : '—';
  const vr    = ac.baro_rate ? `${ac.baro_rate > 0 ? '+':''}${ac.baro_rate} fpm` : '—';
  const dist  = `${ac._distNm.toFixed(1)} nm`;
  const brng  = `${Math.round(ac._bearing)}°`;
  const squawk = ac.squawk || '—';
  const type  = ac.t || '—';

  panel.innerHTML = `
    <div class="dp-title">${callsign}</div>
    <div class="dp-row"><span>Type</span><span>${type}</span></div>
    <div class="dp-row"><span>Altitude</span><span>${alt}</span></div>
    <div class="dp-row"><span>Speed</span><span>${spd}</span></div>
    <div class="dp-row"><span>Heading</span><span>${hdg}</span></div>
    <div class="dp-row"><span>Vert rate</span><span>${vr}</span></div>
    <div class="dp-row"><span>Distance</span><span>${dist}</span></div>
    <div class="dp-row"><span>Bearing</span><span>${brng}</span></div>
    <div class="dp-row"><span>Squawk</span><span>${squawk}</span></div>
  `;
}

// ─── Demo mode ────────────────────────────────────────────────────────────────
function injectDemoData() {
  const seed = [
    { hex:'400615', flight:'BAW123 ', alt_baro:32000, gs:480, track:220, squawk:'1234', t:'B77W', dbFlags:0 },
    { hex:'4007f1', flight:'EZY55KL', alt_baro:28000, gs:420, track:135, squawk:'2341', t:'A320', dbFlags:0 },
    { hex:'4ca7b3', flight:'RYR7KQ ', alt_baro:15000, gs:380, track: 60, squawk:'3412', t:'B738', dbFlags:0 },
    { hex:'3c4b27', flight:'DLH44B ', alt_baro:41000, gs:510, track:290, squawk:'4123', t:'A359', dbFlags:0 },
    { hex:'4b1a20', flight:'KLM302 ', alt_baro: 8000, gs:290, track:350, squawk:'1432', t:'E190', dbFlags:0 },
    { hex:'407c88', flight:'IBE21AH', alt_baro:37000, gs:490, track:185, squawk:'2143', t:'A333', dbFlags:0 },
    { hex:'4cad20', flight:'AER831 ', alt_baro: 3500, gs:210, track: 95, squawk:'3214', t:'AT75', dbFlags:0 },
    { hex:'43c3b1', flight:'RRR6872', alt_baro:22000, gs:330, track:310, squawk:'7004', t:'ASTR', dbFlags:1 },  // RAF Astute — military flag
    { hex:'43e14a', flight:'NATO01 ', alt_baro: 5000, gs:280, track: 40, squawk:'7777', t:'E3CF', dbFlags:1 },  // NATO AWACS — mil squawk
  ];
  // Drift positions slowly over time
  const t = Date.now() / 1000;
  const raw = seed.map((ac, i) => {
    const phase = (t * 0.003 + i * 0.8) % (Math.PI * 2);
    const r     = 0.1 + (i % 4) * 0.2;
    return {
      ...ac,
      lat: STATE.lat + r * Math.sin(phase + i),
      lon: STATE.lon + r * Math.cos(phase + i * 0.7),
    };
  });
  processAircraft(raw);
  setStatus(`DEMO MODE — ${raw.length} simulated aircraft`, 'status-warn');
  document.getElementById('ft-poll').textContent = `Simulated`;
}

// ─── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('range-slider').addEventListener('input', function() {
  STATE.radiusNm = parseInt(this.value);
  document.getElementById('range-val').textContent = `${STATE.radiusNm} nm`;
  document.getElementById('ft-count').textContent = `Range: ${STATE.radiusNm}nm`;
  renderList();
});

document.getElementById('alt-slider').addEventListener('input', function() {
  STATE.minAlt = parseInt(this.value);
  const label  = STATE.minAlt === 0 ? 'ALL' : `${STATE.minAlt.toLocaleString()}ft`;
  document.getElementById('alt-val').textContent = label;
  renderList();
});

document.getElementById('mil-toggle').addEventListener('change', function() {
  STATE.milOnly = this.checked;
  renderList();
});

document.getElementById('audio-badge').addEventListener('click', function() {
  STATE.audioOn = !STATE.audioOn;
  this.textContent = STATE.audioOn ? '♪ ON' : '♪ OFF';
  this.classList.toggle('on', STATE.audioOn);
  // Play a test ping when enabling so user knows it works
  if (STATE.audioOn) playPing();
});

// Click on radar canvas to select nearest aircraft
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;
  let best = null, bestDist = 20;
  STATE.aircraft.forEach(ac => {
    if (ac._distNm > STATE.radiusNm) return;
    const { x, y } = polarToXY(ac._bearing, ac._distNm);
    const d = Math.hypot(mx - x, my - y);
    if (d < bestDist) { bestDist = d; best = ac; }
  });
  if (best) selectAircraft(best.hex);
  else STATE.selected = null, renderDetail(null), renderList();
});

// ─── Config modal ─────────────────────────────────────────────────────────────
function openConfig() {
  document.getElementById('cfg-overlay').classList.add('open');
  document.getElementById('cfg-key').value  = STATE.apiKey || '';
  document.getElementById('cfg-lat').value  = STATE.lat;
  document.getElementById('cfg-lon').value  = STATE.lon;
  document.getElementById('cfg-poll').value = STATE.pollMs / 1000;
}
function closeConfig() {
  document.getElementById('cfg-overlay').classList.remove('open');
}

document.getElementById('cfg-btn').addEventListener('click', openConfig);
document.getElementById('cfg-cancel').addEventListener('click', closeConfig);

document.getElementById('cfg-demo').addEventListener('click', () => {
  STATE.demoMode = true;
  STATE.apiKey   = '';
  // Use Redruth as the demo home position
  if (!document.getElementById('cfg-lat').value) STATE.lat = 50.2330;
  if (!document.getElementById('cfg-lon').value) STATE.lon = -5.2280;
  const dLat = parseFloat(document.getElementById('cfg-lat').value) || STATE.lat;
  const dLon = parseFloat(document.getElementById('cfg-lon').value) || STATE.lon;
  STATE.lat = dLat; STATE.lon = dLon;
  STATE.coastFeatures = null;
  loadCoastline();
  closeConfig();
  startPolling();
  setStatus('DEMO MODE', 'status-warn');
  document.getElementById('hdr-coords').textContent =
    `${STATE.lat.toFixed(4)}°N  ${Math.abs(STATE.lon).toFixed(4)}°W (demo)`;
});

document.getElementById('cfg-save').addEventListener('click', () => {
  const key  = document.getElementById('cfg-key').value.trim();
  const lat  = parseFloat(document.getElementById('cfg-lat').value);
  const lon  = parseFloat(document.getElementById('cfg-lon').value);
  const poll = parseInt(document.getElementById('cfg-poll').value);
  if (!key) { alert('API key required'); return; }
  if (isNaN(lat) || isNaN(lon)) { alert('Enter valid coordinates'); return; }
  STATE.apiKey   = key;
  STATE.lat      = lat;
  STATE.lon      = lon;
  STATE.pollMs   = Math.max(3000, poll * 1000);
  STATE.demoMode = false;
  // Reset and reload coastline centred on new position
  STATE.coastFeatures = null;
  loadCoastline();
  document.getElementById('hdr-coords').textContent =
    `${lat.toFixed(4)}°N  ${Math.abs(lon).toFixed(4)}°W`;
  closeConfig();
  startPolling();
  setStatus('Connecting…', 'status-warn');
});

document.getElementById('cfg-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cfg-overlay')) closeConfig();
});

// ─── Polling ──────────────────────────────────────────────────────────────────
function startPolling() {
  if (STATE.pollTimer) clearInterval(STATE.pollTimer);
  fetchAircraft();
  STATE.pollTimer = setInterval(fetchAircraft, STATE.pollMs);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
// Load coastline in background immediately
loadCoastline();
// Show config on first load
openConfig();
document.getElementById('hdr-coords').textContent = '— configure to start —';
</script>
